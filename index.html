<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense &amp; Budget Visualizer</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="app-container">

      <!-- Header -->
      <header class="app-header">
        <h1>Budget Visualizer</h1>
        <button
          type="button"
          id="theme-toggle"
          class="btn-theme-toggle"
          aria-label="Switch to dark mode"
          title="Toggle dark / light mode"
        >
          <span class="theme-icon" aria-hidden="true">🌙</span>
        </button>
      </header>

      <main>

        <!-- Balance Section -->
        <section class="balance-section" aria-label="Total Balance">
          <h2 class="balance-label">Total Balance</h2>
          <p class="balance-amount" id="total-balance">$0.00</p>
        </section>

        <!-- Transaction Form -->
        <section class="form-section" aria-label="Add Transaction">
          <h2>Add Transaction</h2>
          <form id="transaction-form" novalidate>
            <div class="form-group">
              <label for="item-name">Item Name</label>
              <input
                type="text"
                id="item-name"
                name="item-name"
                placeholder="e.g. Coffee"
                required
                autocomplete="off"
              />
            </div>

            <div class="form-group">
              <label for="amount">Amount ($)</label>
              <input
                type="number"
                id="amount"
                name="amount"
                placeholder="0.00"
                min="0.01"
                step="0.01"
                required
              />
            </div>

            <div class="form-group">
              <label for="category">Category</label>
              <select id="category" name="category" required>
                <option value="" disabled selected>Select a category</option>
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Fun">Fun</option>
                <option value="__custom__">Other…</option>
              </select>
            </div>

            <div class="form-group" id="custom-category-group" hidden>
              <label for="custom-category">Custom Category Name</label>
              <input
                type="text"
                id="custom-category"
                name="custom-category"
                placeholder="e.g. Health, Shopping…"
                autocomplete="off"
              />
            </div>

            <button type="submit" class="btn-submit">Add Transaction</button>
          </form>
        </section>

        <!-- Transaction List -->
        <section class="transactions-section" aria-label="Transaction History">
          <div class="transactions-header">
            <h2>Transactions</h2>
            <div class="sort-controls" role="group" aria-label="Sort transactions">
              <button type="button" class="btn-sort" id="sort-amount" data-sort="amount" aria-pressed="false">
                Amount <span class="sort-arrow" aria-hidden="true"></span>
              </button>
              <button type="button" class="btn-sort" id="sort-category" data-sort="category" aria-pressed="false">
                Category <span class="sort-arrow" aria-hidden="true"></span>
              </button>
            </div>
          </div>
          <ul id="transaction-list" class="transaction-list" aria-live="polite">
            <!-- Transactions are injected here by JavaScript -->
          </ul>
          <p id="no-transactions-msg" class="empty-state">No transactions yet. Add one above!</p>
        </section>

        <!-- Pie Chart -->
        <section class="chart-section" aria-label="Spending by Category">
          <h2>Spending by Category</h2>
          <div class="chart-wrapper">
            <canvas id="spending-chart" role="img" aria-label="Pie chart showing spending by category"></canvas>
          </div>
          <ul id="chart-legend" class="chart-legend" aria-label="Chart legend">
            <!-- Legend items are injected here by JavaScript -->
          </ul>
        </section>

      </main>

      <footer class="app-footer">
        <p>&copy; 2026 Budget Visualizer</p>
      </footer>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
